name: Create Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if this push was from the bot's version bump commit
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for changelog generation

      # ========== VALIDATION CHECKS ==========
      # All checks must pass before release is built

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Lua syntax check
        run: |
          echo "Running Lua syntax check on all Lua files..."
          
          FILES=$(find . -name "*.lua" -not -path "./Libs/*" -type f)
          if [ -z "$FILES" ]; then
            echo "No Lua files found outside Libs/"
            exit 1
          fi
          
          FILE_COUNT=$(echo "$FILES" | wc -l)
          echo "Found $FILE_COUNT Lua files to check"
          
          ERRORS=0
          while IFS= read -r file; do
            # luac -p parses without executing - catches syntax errors only
            if ! luac5.1 -p "$file" 2>&1; then
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$FILES"
          
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ Lua syntax errors found in $ERRORS file(s)! Fix them before release."
            exit 1
          fi
          echo "✅ Lua syntax check passed ($FILE_COUNT files)"

      - name: TOC file validation
        run: |
          echo "Validating TOC file references..."
          ERRORS=0
          
          # Extract file references from TOC (lines not starting with ## or #)
          while IFS= read -r line; do
            # Skip comments and empty lines
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*$ ]] && continue
            
            # Convert backslashes to forward slashes and trim whitespace
            FILE=$(echo "$line" | tr '\\' '/' | xargs)
            
            # Skip if empty after trim
            [[ -z "$FILE" ]] && continue
            
            # Check if file exists
            if [[ ! -f "$FILE" ]]; then
              echo "❌ Missing file: $FILE"
              ERRORS=$((ERRORS + 1))
            fi
          done < CleanerChat.toc
          
          if [[ $ERRORS -gt 0 ]]; then
            echo ""
            echo "❌ TOC validation failed: $ERRORS missing file(s)"
            exit 1
          fi
          echo "✅ TOC file validation passed"

      - name: Locale completeness check
        run: |
          echo "Checking locale file completeness..."
          
          # Get all keys from the base enUS locale
          BASE_KEYS=$(grep -oP 'L\["\K[^"]+' Locale/enUS.lua | sort -u)
          BASE_COUNT=$(echo "$BASE_KEYS" | wc -l)
          echo "Base locale (enUS) has $BASE_COUNT keys"
          
          ERRORS=0
          for LOCALE_FILE in Locale/*.lua; do
            [[ "$LOCALE_FILE" == "Locale/enUS.lua" ]] && continue
            
            LOCALE_NAME=$(basename "$LOCALE_FILE" .lua)
            LOCALE_KEYS=$(grep -oP 'L\["\K[^"]+' "$LOCALE_FILE" | sort -u)
            
            # Find missing keys
            MISSING=$(comm -23 <(echo "$BASE_KEYS") <(echo "$LOCALE_KEYS"))
            MISSING_COUNT=$(echo "$MISSING" | grep -c . || true)
            
            if [[ $MISSING_COUNT -gt 0 ]]; then
              echo "❌ $LOCALE_NAME: missing $MISSING_COUNT key(s):"
              echo "$MISSING" | head -10
              [[ $MISSING_COUNT -gt 10 ]] && echo "  ... and $((MISSING_COUNT - 10)) more"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ $LOCALE_NAME: complete"
            fi
          done
          
          if [[ $ERRORS -gt 0 ]]; then
            echo ""
            echo "❌ Locale check failed: $ERRORS locale file(s) have missing keys"
            exit 1
          fi
          echo "✅ Locale check passed"

      # ========== BUILD RELEASE ==========

      - name: Calculate version
        id: version
        run: |
          # Count existing v1.x tags to determine next version
          TAG_COUNT=$(git tag -l 'v1.*' | wc -l)
          
          # First release will be v1.0, then v1.1, v1.2, etc.
          VERSION="1.${TAG_COUNT}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version: v$VERSION (found $TAG_COUNT existing v1.x tags)"

      - name: Update TOC version
        run: |
          # Update the version in the TOC file for the release
          sed -i "s/^## Version:.*/## Version: ${{ steps.version.outputs.version }}/" CleanerChat.toc
          echo "Updated TOC version to ${{ steps.version.outputs.version }}"
          grep "## Version" CleanerChat.toc

      - name: Update README version badge
        run: |
          # Keep the README version badge in sync with the .toc / release.
          # Matches the shields.io static badge "version-<x.y>-DFBA69".
          sed -i -E "s|version-[0-9]+(\.[0-9]+)*-DFBA69|version-${{ steps.version.outputs.version }}-DFBA69|" README.md
          echo "Updated README version badge to ${{ steps.version.outputs.version }}"
          grep -o "version-[0-9.]*-DFBA69" README.md || true

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag, or all commits if no tags exist
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tags found, using all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            echo "Last tag: $LAST_TAG"
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Handle empty commits
          if [ -z "$COMMITS" ]; then
            COMMITS="- Initial release"
          fi
          
          # Write to file for multiline support
          echo "$COMMITS" > changelog.txt
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create addon zip
        run: |
          # Create a clean directory for the addon
          mkdir -p release/CleanerChat
          
          # Copy addon files (exclude git, github, and other non-addon files)
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='.gitignore' \
                    --exclude='release' \
                    --exclude='*.zip' \
                    --exclude='changelog.txt' \
                    ./ release/CleanerChat/
          
          # Create the zip file with constant name for /releases/latest/download/CleanerChat.zip
          cd release
          zip -r ../CleanerChat.zip CleanerChat
          cd ..
          
          echo "Created: CleanerChat.zip (v${{ steps.version.outputs.version }})"
          ls -la *.zip

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 0
          delete_tags: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CleanerChat v${{ steps.version.outputs.version }}
          body: |
            ## CleanerChat v${{ steps.version.outputs.version }}
            
            A modern chat UI overhaul with message filtering, animations, and extensive customization for WoW 3.3.5a.
            
            ### Changes
            ${{ steps.changelog.outputs.changelog }}
            
            ### Installation
            1. Download `CleanerChat.zip`
            2. Extract to `Interface\AddOns\`
            3. Restart WoW or `/reload`
            
            **Direct download:** https://github.com/migwynkriid/CleanerChat-WotLK/releases/latest/download/CleanerChat.zip
          files: CleanerChat.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated TOC version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CleanerChat.toc README.md
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Discord notification on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -d "{\"embeds\": [{\"title\": \"❌ CleanerChat Build Failed\", \"description\": \"The release workflow failed on commit \`${{ github.sha }}\`\", \"color\": 15158332, \"fields\": [{\"name\": \"Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true}, {\"name\": \"Commit\", \"value\": \"[${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true}, {\"name\": \"Run\", \"value\": \"[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}]}]}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
